<title>Stock Explorer — Investment Learning Tool</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ─── STORAGE HELPERS ──────────────────────────────────────────────────────────
const LS = {
  get: (k, def=null) => { try { const v=localStorage.getItem(k); return v ? JSON.parse(v) : def; } catch { return def; } },
  set: (k, v)        => { try { localStorage.setItem(k, JSON.stringify(v)); } catch {} },
  del: (k)           => { try { localStorage.removeItem(k); } catch {} },
};

const STORAGE_KEYS = {
  access:    "sx_access_code",
  movers:    "sx_last_movers",
  research:  "sx_last_research",
  compare:   "sx_last_compare",
  chain:     "sx_last_chain",
  chainLib:  "sx_chain_library",
  panel:     "sx_last_panel",
  valuation: "sx_last_valuation",
  watchlist: "sx_watchlist",
};

// ─── ANTHROPIC API (via Cloudflare Worker proxy) ──────────────────────────────
// Requests go to our own Worker, which holds the Anthropic key server-side and
// checks a shared access password. The key is never present in the browser.
const PROXY_URL = "https://stock-explorer-proxy.alistair-mccreadie.workers.dev";
const sleep = ms => new Promise(r=>setTimeout(r,ms));

// max_tokens is a CEILING, not a target — the model only emits what it needs, so
// a high cap costs nothing extra but prevents web-search overhead (tool-use blocks
// count against the budget) from truncating multi-section answers.
const MAX_NARRATIVE = 8000;

// ─── LOCKED OUTPUT FORMAT ─────────────────────────────────────────────────────
// One shared spec so every tab produces the same shape every run: balanced length,
// tables for hard data, short prose for explanation, fixed closing sections.
const FORMAT_RULES = [
  "",
  "FORMATTING RULES — apply these exactly on every response:",
  "- Output ONLY the section headings listed above, each prefixed with '## ', in the exact order given. Do not add, remove, rename, or reorder sections. Write nothing before the first heading or after the last section.",
  "- Balanced length: at most 2-4 sentences OR 3-5 bullet points per prose section. Be specific with real numbers and briefly explain any jargon in plain English.",
  "- Put hard data — financials, metrics, multi-point timelines — in a Markdown table rather than prose, using this exact syntax:",
  "| Column | Column |",
  "| --- | --- |",
  "- If a figure isn't available, write \"n/a\" rather than guessing.",
].join("\n");

// Compose a system prompt: a role line, the tab's sections, then the two fixed closers.
function buildSys(role, sections) {
  const body = sections.map(s => "## "+s.h + (s.d ? "\n"+s.d : "")).join("\n");
  return [
    role,
    "",
    "Structure your answer with EXACTLY these sections, in this order:",
    body,
    "## Key Numbers",
    "A Markdown table (columns: | Metric | Value |) of the 3-5 most important figures for this query.",
    "## What to Watch Next",
    "Exactly ONE sentence on the single most important thing to monitor next.",
    FORMAT_RULES,
  ].join("\n");
}

function friendlyError(status, err) {
  const msg = (err && err.message) || "Unknown error";
  if (status===401) return (err && err.message) || "Access denied (401). Check the access password is correct.";
  if (status===429) return "Rate limit hit (429). Wait a moment and try again — or add more credit if your balance is low.";
  if (status===529) return "Anthropic's servers are overloaded right now (529). Please try again in a few seconds.";
  if (status>=500) return (err && err.message) || ("The server hit an error ("+status+"). Please try again shortly.");
  return msg;
}

const TRUNC_NOTE = "\n\n---\n*⚠️ This answer reached the length limit and was cut off. Re-run it, or ask for fewer details / a single section.*";

function extractTextSources(data) {
  const blocks = (data.content||[]);
  let text = blocks.filter(b=>b.type==="text").map(b=>b.text).join("\n");
  const sources = [], seen = new Set();
  blocks.forEach(b=>{
    (b.citations||[]).forEach(c=>{
      if (c && c.url && !seen.has(c.url)) { seen.add(c.url); sources.push({ url:c.url, title:c.title||c.url }); }
    });
  });
  if (data.stop_reason==="max_tokens") text += TRUNC_NOTE;
  return { text, sources };
}

// Parse the Server-Sent-Events stream, calling onDelta(fullTextSoFar) as text arrives.
async function readStream(res, onDelta) {
  const reader = res.body.getReader();
  const dec = new TextDecoder();
  let buf="", text="", sources=[], seen=new Set(), truncated=false;
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream:true });
    let nl;
    while ((nl = buf.indexOf("\n")) >= 0) {
      const line = buf.slice(0, nl).trim();
      buf = buf.slice(nl+1);
      if (!line.startsWith("data:")) continue;
      const payload = line.slice(5).trim();
      if (!payload || payload==="[DONE]") continue;
      let evt; try { evt = JSON.parse(payload); } catch { continue; }
      if (evt.type==="content_block_delta" && evt.delta) {
        if (evt.delta.type==="text_delta") { text += evt.delta.text; onDelta(text); }
        else if (evt.delta.type==="citations_delta" && evt.delta.citation) {
          const c = evt.delta.citation;
          if (c.url && !seen.has(c.url)) { seen.add(c.url); sources.push({ url:c.url, title:c.title||c.url }); }
        }
      } else if (evt.type==="message_delta" && evt.delta && evt.delta.stop_reason==="max_tokens") {
        truncated = true;
      } else if (evt.type==="error") {
        throw new Error(friendlyError(0, evt.error));
      }
    }
  }
  if (truncated) text += TRUNC_NOTE;
  return { text, sources };
}

// Returns { text, sources }. `access` is the shared password sent to our proxy.
// Pass onDelta to stream tokens as they arrive.
async function callClaude(access, sys, usr, maxTokens, useSearch, onDelta) {
  const stream = typeof onDelta === "function";
  const body = {
    model: "claude-sonnet-4-6",
    max_tokens: maxTokens || 1200,
    system: sys,
    messages: [{ role:"user", content:usr }],
  };
  if (stream) body.stream = true;
  if (useSearch !== false) body.tools = [{ type:"web_search_20250305", name:"web_search" }];

  let lastStatus = 0;
  for (let attempt=0; attempt<3; attempt++) {
    let res;
    try {
      res = await fetch(PROXY_URL, {
        method: "POST",
        headers: { "Content-Type":"application/json", "x-access-code":access },
        body: JSON.stringify(body),
      });
    } catch(netErr) {
      // Network/CORS failure — retry a couple of times before giving up.
      if (attempt<2) { await sleep(800*(attempt+1)); continue; }
      throw new Error("Network error reaching the server. Check your connection and try again.");
    }
    lastStatus = res.status;
    if (!res.ok) {
      let errObj=null; try { errObj=(await res.json()).error; } catch {}
      const retryable = res.status===429 || res.status===529 || res.status>=500;
      if (retryable && attempt<2) { await sleep(1000*(attempt+1)*(attempt+1)); continue; }
      throw new Error(friendlyError(res.status, errObj));
    }
    if (stream) return await readStream(res, onDelta);
    const data = await res.json();
    if (data.error) {
      const retryable = res.status===429 || res.status===529 || res.status>=500;
      if (retryable && attempt<2) { await sleep(1000*(attempt+1)*(attempt+1)); continue; }
      throw new Error(friendlyError(res.status, data.error));
    }
    return extractTextSources(data);
  }
  throw new Error(friendlyError(lastStatus, null));
}

// ─── SHARED CHAIN LIBRARY (server-side, via the proxy) ────────────────────────
async function libraryGet(access) {
  const res = await fetch(PROXY_URL + "/library", { method:"GET", headers:{ "x-access-code":access } });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(friendlyError(res.status, data.error));
  return data.entries || [];
}
async function libraryWrite(access, payload) {
  const res = await fetch(PROXY_URL + "/library", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-access-code":access },
    body: JSON.stringify(payload),
  });
  const data = await res.json().catch(()=>({}));
  if (!res.ok) throw new Error(friendlyError(res.status, data.error));
  return data.entries || [];
}

// ─── API KEY GATE ─────────────────────────────────────────────────────────────
function ApiKeyGate({ onKey }) {
  const [val, setVal]     = useState("");
  const [err, setErr]     = useState(null);
  const [testing, setT]   = useState(false);

  const submit = async () => {
    const code = val.trim();
    if (!code) { setErr("Please enter the access password."); return; }
    setT(true); setErr(null);
    try {
      await callClaude(code, "You are a test.", "Reply with the single word: ready", 10, false);
      LS.set(STORAGE_KEYS.access, code);
      onKey(code);
    } catch(e) { setErr(e.message); }
    finally { setT(false); }
  };

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:24}}>
      <div style={{maxWidth:480,width:"100%",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,padding:40}}>
        <div style={{fontFamily:"Space Grotesk,sans-serif",fontSize:11,fontWeight:700,letterSpacing:".15em",textTransform:"uppercase",color:"var(--accent)",marginBottom:12}}>
          Investment Learning Tool
        </div>
        <h1 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:26,fontWeight:700,marginBottom:8,letterSpacing:"-.02em"}}>
          Stock <span style={{color:"var(--accent2)"}}>Explorer</span>
        </h1>
        <p style={{fontSize:14,color:"var(--text-muted)",lineHeight:1.6,marginBottom:32}}>
          Enter the access password to get started. It's saved in this browser so you only need to do this once.
        </p>

        <div style={{marginBottom:8}}>
          <label style={{fontSize:12,color:"var(--text-muted)",display:"block",marginBottom:6}}>Access Password</label>
          <input
            type="password"
            placeholder="Enter password"
            value={val}
            onChange={e=>setVal(e.target.value)}
            onKeyDown={e=>e.key==="Enter"&&submit()}
            autoFocus
            style={{width:"100%",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none"}}
          />
        </div>
        {err && <div style={{fontSize:12,color:"var(--danger)",marginBottom:12}}>{err}</div>}

        <button onClick={submit} disabled={testing||!val.trim()}
          style={{width:"100%",background:"var(--accent)",color:"#fff",border:"none",borderRadius:8,padding:"11px 0",fontFamily:"Inter,sans-serif",fontSize:14,fontWeight:600,cursor:testing?"wait":"pointer",opacity:testing||!val.trim()?0.5:1,marginTop:8}}>
          {testing ? "Checking…" : "Enter"}
        </button>

        <div style={{marginTop:24,padding:"16px",background:"var(--surface2)",borderRadius:8,fontSize:12,color:"var(--text-dim)",lineHeight:1.6}}>
          <strong style={{color:"var(--text-muted)"}}>Don't have the password?</strong> Ask whoever shared this link with you. There's nothing to sign up for and nothing to pay — just enter the password and start exploring.
        </div>
      </div>
    </div>
  );
}

// ─── SHARED UI ────────────────────────────────────────────────────────────────
function Loader({ label }) {
  return (
    <div style={{display:"flex",alignItems:"center",gap:12,padding:"28px 0",color:"var(--text-muted)",fontSize:14}}>
      <div style={{width:20,height:20,border:"2px solid var(--border)",borderTopColor:"var(--accent)",borderRadius:"50%",animation:"spin .8s linear infinite",flexShrink:0}}/>
      <span>{label||"Researching…"}</span>
    </div>
  );
}

function StreamNote() {
  return (
    <div style={{display:"flex",alignItems:"center",gap:8,marginTop:16,marginBottom:-8,color:"var(--accent2)",fontSize:12}}>
      <span style={{width:8,height:8,borderRadius:"50%",background:"var(--accent2)",animation:"spin .8s linear infinite",display:"inline-block"}}/>
      Generating live…
    </div>
  );
}

// ─── WATCHLIST ────────────────────────────────────────────────────────────────
// Shared across tabs via localStorage + a window event so all bars stay in sync.
function useWatchlist() {
  const [list,setList] = useState(()=>LS.get(STORAGE_KEYS.watchlist,[]));
  useEffect(()=>{
    const h=()=>setList(LS.get(STORAGE_KEYS.watchlist,[]));
    window.addEventListener("sx-watchlist",h);
    return ()=>window.removeEventListener("sx-watchlist",h);
  },[]);
  const add=t=>{ t=(t||"").toUpperCase().trim(); if(!t)return; const cur=LS.get(STORAGE_KEYS.watchlist,[]); if(!cur.includes(t)){LS.set(STORAGE_KEYS.watchlist,[...cur,t]);} window.dispatchEvent(new Event("sx-watchlist")); };
  const remove=t=>{ t=(t||"").toUpperCase().trim(); const cur=LS.get(STORAGE_KEYS.watchlist,[]); LS.set(STORAGE_KEYS.watchlist,cur.filter(x=>x!==t)); window.dispatchEvent(new Event("sx-watchlist")); };
  const has=t=>list.includes((t||"").toUpperCase().trim());
  return { list, add, remove, has };
}

function StarToggle({ ticker }) {
  const { has, add, remove } = useWatchlist();
  const t=(ticker||"").toUpperCase().trim();
  if(!t) return null;
  const on=has(t);
  return (
    <button title={on?"Remove from watchlist":"Add to watchlist"} onClick={()=>on?remove(t):add(t)}
      style={{background:"none",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:on?"var(--accent3)":"var(--text-dim)",fontSize:16,lineHeight:1,padding:"8px 10px",cursor:"pointer"}}>
      {on?"★":"☆"}
    </button>
  );
}

function WatchlistBar({ onPick, label }) {
  const { list, remove } = useWatchlist();
  if(!list.length) return null;
  return (
    <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center",marginBottom:16}}>
      <span style={{fontSize:12,color:"var(--accent3)",whiteSpace:"nowrap"}}>★ {label||"Watchlist:"}</span>
      {list.map(t=>(
        <span key={t} style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:20,padding:"4px 6px 4px 12px"}}>
          <button onClick={()=>onPick(t)} title="Load and run"
            style={{background:"none",border:"none",color:"var(--text)",fontFamily:"Space Grotesk,sans-serif",fontSize:12,fontWeight:700,letterSpacing:".03em",cursor:"pointer",padding:0}}>{t}</button>
          <button onClick={()=>remove(t)} title="Remove"
            style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:14,lineHeight:1,cursor:"pointer",padding:0}}>×</button>
        </span>
      ))}
    </div>
  );
}

// ─── GLOSSARY ─────────────────────────────────────────────────────────────────
const GLOSSARY = {
  "P/E": "Price-to-earnings ratio — the share price divided by earnings per share. A rough gauge of how expensive a stock is versus its profits.",
  "P/S": "Price-to-sales ratio — market value divided by annual revenue. Useful for companies that aren't profitable yet.",
  "P/B": "Price-to-book ratio — share price versus the company's net asset (book) value per share.",
  "EPS": "Earnings per share — a company's profit divided by its number of shares.",
  "EBITDA": "Earnings before interest, tax, depreciation and amortisation — a measure of core operating profit.",
  "EV/EBITDA": "Enterprise value divided by EBITDA — a valuation multiple that accounts for debt, often used to compare companies.",
  "market cap": "Market capitalisation — the total value of all a company's shares (share price × shares outstanding).",
  "free cash flow": "Cash a business generates after paying for its operations and investments — money it can return to shareholders or reinvest.",
  "cash flow": "The actual cash moving in and out of a business, as opposed to accounting profit.",
  "gross margin": "Revenue minus the direct cost of goods sold, as a % of revenue. Shows raw product profitability.",
  "operating margin": "Operating profit as a % of revenue — profitability after running costs but before interest and tax.",
  "net margin": "Net profit as a % of revenue — what's left after all costs, interest and tax.",
  "operating income": "Profit from core operations, before interest and tax.",
  "moat": "A durable competitive advantage (brand, scale, patents, network effects) that protects a company's profits from rivals.",
  "dividend yield": "Annual dividends per share divided by the share price — the income return a stock pays.",
  "valuation": "An estimate of what a company or its shares are worth, often via multiples like P/E or P/S.",
  "volatility": "How much a price swings up and down over time — a common proxy for risk.",
  "market share": "The slice of total industry sales a company captures.",
  "guidance": "Management's own forecast for future revenue or profit, given to investors.",
  "ROE": "Return on equity — profit as a % of shareholders' equity; how efficiently a firm uses investors' money.",
  "ROIC": "Return on invested capital — profit relative to all capital (debt + equity) put into the business.",
  "balance sheet": "A snapshot of what a company owns (assets) and owes (liabilities) at a point in time.",
  "TAM": "Total addressable market — the total revenue opportunity if a product reached every possible customer.",
  "CAGR": "Compound annual growth rate — the smoothed yearly growth rate over a multi-year period.",
  "short interest": "The number of shares investors have sold short, betting the price will fall.",
};
const GLOSSARY_KEYS = Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
const GLOSSARY_RE = new RegExp("("+GLOSSARY_KEYS.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")).join("|")+")","gi");

function GlossaryTerm({ term, def }) {
  const [open,setOpen] = useState(false);
  return (
    <span style={{position:"relative"}}>
      <span onClick={()=>setOpen(o=>!o)} style={{borderBottom:"1px dotted var(--accent2)",cursor:"help"}}>{term}</span>
      {open&&(
        <span style={{position:"absolute",left:0,top:"100%",zIndex:30,marginTop:6,display:"block",width:250,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:8,padding:"10px 12px",fontSize:12,fontWeight:400,color:"var(--text)",lineHeight:1.5,boxShadow:"0 8px 24px rgba(0,0,0,.45)",whiteSpace:"normal",textTransform:"none",letterSpacing:"normal"}}>
          <strong style={{color:"var(--accent2)",display:"block",marginBottom:4,fontFamily:"Space Grotesk,sans-serif"}}>{term}</strong>
          {def}
          <span onClick={e=>{e.stopPropagation();setOpen(false);}} style={{position:"absolute",top:6,right:8,cursor:"pointer",color:"var(--text-dim)"}}>×</span>
        </span>
      )}
    </span>
  );
}

// Wrap the first occurrence of each known financial term (per result) in a tappable definition.
function linkifyGlossary(str, kp, seen) {
  if (!str || !seen) return [str];
  const out=[]; let last=0, m, i=0;
  GLOSSARY_RE.lastIndex=0;
  while ((m = GLOSSARY_RE.exec(str)) !== null) {
    const s=m.index, e=GLOSSARY_RE.lastIndex;
    const before=str[s-1], after=str[e];
    const wordy=c=>c&&/[A-Za-z0-9]/.test(c);
    if (wordy(before)||wordy(after)) continue;            // inside a larger word — skip
    const term=m[0], lc=term.toLowerCase();
    if (seen.has(lc)) continue;                            // only the first mention
    const canon=GLOSSARY_KEYS.find(k=>k.toLowerCase()===lc);
    seen.add(lc);
    if (s>last) out.push(str.slice(last,s));
    out.push(<GlossaryTerm key={kp+"-g"+i} term={term} def={GLOSSARY[canon]}/>);
    last=e; i++;
  }
  if (last<str.length) out.push(str.slice(last));
  return out.length?out:[str];
}

// Render inline markdown — **bold**, *italic*, `code`, [text](url) — plus glossary terms.
function renderInline(str, kp, gloss) {
  if (!str) return null;
  const re = /(\*\*([^*]+)\*\*|\*([^*]+)\*|`([^`]+)`|\[([^\]]+)\]\(([^)]+)\))/g;
  const nodes = []; let last=0, m, i=0;
  const plain=(seg,k)=>{ (gloss?linkifyGlossary(seg,k,gloss):[seg]).forEach(n=>nodes.push(n)); };
  while ((m = re.exec(str)) !== null) {
    if (m.index>last) plain(str.slice(last,m.index), kp+"-p"+i);
    if (m[2]!==undefined)       nodes.push(<strong key={kp+"-b"+i} style={{fontWeight:600,color:"var(--text)"}}>{m[2]}</strong>);
    else if (m[3]!==undefined)  nodes.push(<em key={kp+"-i"+i}>{m[3]}</em>);
    else if (m[4]!==undefined)  nodes.push(<code key={kp+"-c"+i} style={{fontFamily:"monospace",fontSize:"0.9em",background:"var(--surface2)",borderRadius:4,padding:"1px 5px"}}>{m[4]}</code>);
    else if (m[5]!==undefined)  nodes.push(<a key={kp+"-l"+i} href={m[6]} target="_blank" rel="noreferrer" style={{color:"var(--accent)"}}>{m[5]}</a>);
    last = re.lastIndex; i++;
  }
  if (last<str.length) plain(str.slice(last), kp+"-pz");
  return nodes;
}

function Sources({ sources }) {
  if (!sources || sources.length===0) return null;
  return (
    <div style={{marginTop:18,paddingTop:14,borderTop:"1px solid var(--border)"}}>
      <div style={{fontFamily:"Space Grotesk,sans-serif",fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"var(--text-muted)",marginBottom:8}}>
        Sources ({sources.length})
      </div>
      <div style={{display:"flex",flexDirection:"column",gap:4}}>
        {sources.map((s,i)=>(
          <a key={i} href={s.url} target="_blank" rel="noreferrer"
            style={{fontSize:12,color:"var(--accent)",textDecoration:"none",lineHeight:1.5,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
            <span style={{color:"var(--text-dim)"}}>{i+1}.</span> {s.title}
          </a>
        ))}
      </div>
    </div>
  );
}

function CopyButton({ text }) {
  const [done,setDone] = useState(false);
  const copy = async () => {
    try { await navigator.clipboard.writeText(text); setDone(true); setTimeout(()=>setDone(false),1500); } catch {}
  };
  return (
    <button onClick={copy} title="Copy as text"
      style={{position:"absolute",top:14,right:16,background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:done?"var(--success)":"var(--text-muted)",fontSize:11,fontWeight:600,padding:"4px 10px",cursor:"pointer",fontFamily:"Inter,sans-serif",zIndex:1}}>
      {done?"✓ Copied":"Copy"}
    </button>
  );
}

const isTableLine = l => /^\s*\|.*\|\s*$/.test(l);
const isSepRow    = cells => cells.length>0 && cells.every(c=>c===""||/^:?-+:?$/.test(c));
const parseRow    = l => l.trim().replace(/^\|/,"").replace(/\|$/,"").split("|").map(c=>c.trim());

function MdTable({ rows, kp, gloss }) {
  if (!rows.length) return null;
  const [head, ...body] = rows;
  const cell = { padding:"8px 12px", borderBottom:"1px solid var(--border)", textAlign:"left", verticalAlign:"top" };
  return (
    <div style={{overflowX:"auto",margin:"14px 0"}}>
      <table style={{borderCollapse:"collapse",width:"100%",fontSize:13,background:"var(--surface2)",borderRadius:"var(--radius-sm)",overflow:"hidden"}}>
        <thead>
          <tr>{head.map((c,i)=>(
            <th key={i} style={{...cell,color:"var(--accent)",fontWeight:700,fontFamily:"Space Grotesk,sans-serif",fontSize:12,textTransform:"uppercase",letterSpacing:".04em",background:"var(--border)"}}>{renderInline(c,kp+"-h"+i,gloss)}</th>
          ))}</tr>
        </thead>
        <tbody>
          {body.map((r,ri)=>(
            <tr key={ri}>{head.map((_,ci)=>(
              <td key={ci} style={{...cell,color:"var(--text)"}}>{renderInline(r[ci]||"",kp+"-"+ri+"-"+ci,gloss)}</td>
            ))}</tr>
          ))}
        </tbody>
      </table>
    </div>
  );
}

function ParsedResult({ text, sources }) {
  if (!text) return null;
  const lines = text.split("\n");
  const gloss = new Set();          // track first glossary mention across the whole result
  const els = [];
  let i=0, k=0;
  while (i<lines.length) {
    const line = lines[i];
    if (!line.trim()) { i++; continue; }

    // Markdown table — consume the consecutive | … | block.
    if (isTableLine(line)) {
      const rows=[];
      while (i<lines.length && isTableLine(lines[i])) { rows.push(parseRow(lines[i])); i++; }
      const clean = rows.filter(r=>!isSepRow(r));
      if (clean.length) els.push(<MdTable key={k++} rows={clean} kp={"t"+k} gloss={gloss}/>);
      continue;
    }

    if (line.startsWith("### "))      els.push(<h4 key={k++} style={{fontSize:14,fontWeight:600,color:"var(--accent2)",margin:"14px 0 6px"}}>{renderInline(line.slice(4),k,gloss)}</h4>);
    else if (line.startsWith("## "))  els.push(<h3 key={k++} style={{fontFamily:"Space Grotesk,sans-serif",fontSize:14,fontWeight:700,color:"var(--accent)",margin:"20px 0 8px",textTransform:"uppercase",letterSpacing:".05em"}}>{line.slice(3)}</h3>);
    else if (line.startsWith("# "))   els.push(<h2 key={k++} style={{fontFamily:"Space Grotesk,sans-serif",fontSize:20,fontWeight:700,margin:"20px 0 10px",letterSpacing:"-.01em"}}>{line.slice(2)}</h2>);
    else if (/^\*\*[^*]+\*\*$/.test(line)) els.push(<p key={k++} style={{fontSize:14,fontWeight:600,color:"var(--text)",margin:"8px 0"}}>{renderInline(line.slice(2,-2),k,gloss)}</p>);
    else if (line.startsWith("- ")||line.startsWith("• ")) els.push(<li key={k++} style={{fontSize:14,color:"var(--text)",margin:"5px 0 5px 16px",listStyle:"none",position:"relative"}}><span style={{position:"absolute",left:-16,color:"var(--text-dim)"}}>—</span>{renderInline(line.slice(2),k,gloss)}</li>);
    else if (/^\d+\./.test(line))     els.push(<li key={k++} style={{fontSize:14,color:"var(--text)",margin:"5px 0 5px 16px",listStyle:"none",position:"relative"}}><span style={{position:"absolute",left:-16,color:"var(--accent3)"}}>›</span>{renderInline(line.replace(/^\d+\.\s*/,""),k,gloss)}</li>);
    else if (line.startsWith("---"))  els.push(<hr key={k++} style={{border:"none",borderTop:"1px solid var(--border)",margin:"18px 0"}}/>);
    else els.push(<p key={k++} style={{fontSize:14,color:"var(--text)",margin:"6px 0",lineHeight:1.7}}>{renderInline(line,k,gloss)}</p>);
    i++;
  }
  return (
    <div style={{position:"relative",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:"24px 28px",marginTop:20}}>
      <CopyButton text={text}/>
      {els}
      <Sources sources={sources}/>
    </div>
  );
}

function CachedBanner({ timestamp, onClear }) {

// ─── FLOW DIAGRAM ─────────────────────────────────────────────────────────────
const NODE_W=190, NODE_H=140, COL_GAP=90, ROW_GAP=28;
const PALETTE=["#4f8ef7","#7c6af7","#c46af7","#f76aae","#f7876a","#f7b76a","#34d399","#22d3ee","#a78bfa"];

function computeLayout(stages, edges) {
  const n=stages.length;
  const out=Array.from({length:n},()=>[]);
  const inc=Array.from({length:n},()=>[]);
  edges.forEach(e=>{out[e.from].push(e.to);inc[e.to].push(e.from);});
  const col=Array(n).fill(0);
  const deg=inc.map(a=>a.length);
  const q=[]; deg.forEach((d,i)=>{if(d===0)q.push(i);});
  const ord=[];
  while(q.length){const u=q.shift();ord.push(u);out[u].forEach(v=>{deg[v]--;if(deg[v]===0)q.push(v);});}
  ord.forEach(u=>{out[u].forEach(v=>{col[v]=Math.max(col[v],col[u]+1);});});
  const cols={};
  stages.forEach((_,i)=>{const c=col[i];if(!cols[c])cols[c]=[];cols[c].push(i);});
  const cks=Object.keys(cols).map(Number).sort((a,b)=>a-b);
  const cx={};cks.forEach((c,ci)=>{cx[c]=ci*(NODE_W+COL_GAP);});
  const mh=Math.max(...cks.map(c=>cols[c].length*(NODE_H+ROW_GAP)-ROW_GAP));
  const pos={};
  cks.forEach(c=>{
    const its=cols[c],ch=its.length*(NODE_H+ROW_GAP)-ROW_GAP,sy=(mh-ch)/2;
    its.forEach((ni,r)=>{pos[ni]={x:cx[c],y:sy+r*(NODE_H+ROW_GAP)};});
  });
  return {pos,svgW:cks.length*(NODE_W+COL_GAP)-COL_GAP,svgH:mh,out,inc};
}

function FlowDiagram({ stages, edges }) {
  const [active, setActive] = useState(null);
  if (!stages||stages.length===0) return null;

  const vEdges=(edges||[]).filter(e=>
    typeof e.from==="number"&&typeof e.to==="number"&&e.from>=0&&e.to<stages.length&&e.from!==e.to
  );
  const {pos,svgW,svgH,out,inc}=computeLayout(stages,vEdges);

  const activeNodes=new Set(), activeEdges=new Set();
  if(active!==null){
    activeNodes.add(active);
    out[active].forEach(v=>activeNodes.add(v));
    inc[active].forEach(v=>activeNodes.add(v));
    vEdges.forEach((e,i)=>{if(e.from===active||e.to===active)activeEdges.add(i);});
  }
  const has=active!==null;

  function path(f,t){
    const fx=pos[f].x+NODE_W,fy=pos[f].y+NODE_H/2;
    const tx=pos[t].x,ty=pos[t].y+NODE_H/2;
    const cx=(fx+tx)/2;
    return "M "+fx+","+fy+" C "+cx+","+fy+" "+cx+","+ty+" "+tx+","+ty;
  }

  return (
    <div style={{marginTop:24,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius)",padding:24}}>
      <div style={{fontFamily:"Space Grotesk,sans-serif",fontSize:13,fontWeight:700,textTransform:"uppercase",letterSpacing:".1em",color:"var(--text-muted)",marginBottom:6}}>
        Value Chain Flow Diagram
      </div>
      <p style={{fontSize:12,color:"var(--text-dim)",marginBottom:18,lineHeight:1.5}}>
        Click any stage to highlight its connections. Dashed arrows = secondary paths. ⭐ = good starting point for a new investor.
        Stages in the same column are parallel alternatives, not sequential steps.
      </p>
      <div style={{overflowX:"auto",paddingBottom:12}}>
        <svg width={svgW+40} height={svgH+40} viewBox={"0 0 "+(svgW+40)+" "+(svgH+40)} style={{display:"block"}}>
          <defs>
            <marker id="a-n" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#4a5568"/></marker>
            <marker id="a-a" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#f59e0b"/></marker>
            <marker id="a-d" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><polygon points="0 0,8 3,0 6" fill="#1e2433"/></marker>
            <style>{"@keyframes spin{to{transform:rotate(360deg)}}"}</style>
          </defs>
          <g transform="translate(20,20)">
            {vEdges.map((e,i)=>{
              const isA=activeEdges.has(i),isD=has&&!isA;
              return <path key={i} d={path(e.from,e.to)} fill="none"
                stroke={isA?"#f59e0b":isD?"#1e2433":"#4a5568"}
                strokeWidth={isA?2.5:1.5} strokeDasharray={e.secondary?"5,4":"none"}
                markerEnd={isA?"url(#a-a)":isD?"url(#a-d)":"url(#a-n)"}
                opacity={isD?0.1:1} style={{transition:"all .2s"}}/>;
            })}
            {stages.map((s,i)=>{
              const {x,y}=pos[i];
              const col=PALETTE[i%PALETTE.length];
              const isA=active===i,isD=has&&!activeNodes.has(i),isL=has&&!isA&&activeNodes.has(i);
              const bc=isA||isL?"#f59e0b":col;
              const companies=(s.companies||[]).slice(0,4);
              const isBeginner=!!s.beginner;
              return (
                <g key={i} style={{cursor:"pointer"}} onClick={()=>setActive(active===i?null:i)}>
                  {isA&&<rect x={x-4} y={y-4} width={NODE_W+8} height={NODE_H+8} rx="11" fill="none" stroke="#f59e0b" strokeWidth="1.5" opacity=".4"/>}
                  <rect x={x} y={y} width={NODE_W} height={NODE_H} rx="8"
                    fill={isA?"#2a2010":"var(--surface2)"}
                    stroke={bc} strokeWidth={isA||isL?2.5:1.5}
                    opacity={isD?.15:1} style={{transition:"all .2s"}}/>

                  {/* Beginner star badge */}
                  {isBeginner&&(
                    <g opacity={isD?.15:1}>
                      <rect x={x+NODE_W-38} y={y+4} width={34} height={16} rx="8" fill="#f59e0b" opacity=".15"/>
                      <text x={x+NODE_W-21} y={y+15} textAnchor="middle" fontSize="10" fill="#f59e0b" fontFamily="Inter,sans-serif" fontWeight="600">⭐ Start</text>
                    </g>
                  )}

                  {/* Number badge */}
                  <circle cx={x+16} cy={y+16} r="11" fill={isA?"#f59e0b":col} opacity={isD?.15:1}/>
                  <text x={x+16} y={y+20} textAnchor="middle" fill="#fff" fontSize="10" fontFamily="Space Grotesk,sans-serif" fontWeight="700" opacity={isD?.15:1}>{i+1}</text>

                  {/* Stage name */}
                  <foreignObject x={x+6} y={y+30} width={NODE_W-12} height={28}>
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:11,fontFamily:"Space Grotesk,sans-serif",fontWeight:700,color:isA?"#f59e0b":"#e8eaf0",lineHeight:1.3,overflow:"hidden",maxHeight:28,opacity:isD?.15:1}}>
                      {s.name}
                    </div>
                  </foreignObject>

                  {/* What it does — short */}
                  <foreignObject x={x+6} y={y+58} width={NODE_W-12} height={28}>
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:9,fontFamily:"Inter,sans-serif",color:"#8892a4",lineHeight:1.4,overflow:"hidden",maxHeight:28,opacity:isD?.15:1}}>
                      {(s.what||"").slice(0,70)}
                    </div>
                  </foreignObject>

                  {/* Tickers */}
                  <foreignObject x={x+6} y={y+86} width={NODE_W-12} height={28}>
                    <div xmlns="http://www.w3.org/1999/xhtml" style={{display:"flex",flexWrap:"wrap",gap:3,opacity:isD?.15:1}}>
                      {companies.map((c,ci)=>(
                        <span key={ci} style={{fontSize:9,fontFamily:"Space Grotesk,sans-serif",fontWeight:700,padding:"1px 5px",borderRadius:3,border:"1px solid "+(isA?"#f59e0b":col),color:"#e8eaf0",background:"rgba(79,142,247,.1)",letterSpacing:".02em"}}>{c}</span>
                      ))}
                    </div>
                  </foreignObject>

                  {/* Margin */}
                  {s.margin&&(
                    <foreignObject x={x+6} y={y+NODE_H-20} width={NODE_W-12} height={16}>
                      <div xmlns="http://www.w3.org/1999/xhtml" style={{fontSize:9,fontFamily:"Inter,sans-serif",color:isD?"#2a3147":"#8892a4",opacity:isD?.15:1}}>
                        <span style={{fontWeight:600,color:isD?"#2a3147":(isA?"#f59e0b":col)}}>Margin: </span>{s.margin}
                      </div>
                    </foreignObject>
                  )}
                </g>
              );
            })}
          </g>
        </svg>
      </div>
      {active!==null&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:16,marginTop:16,padding:"10px 14px",background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",fontSize:12}}>
          <span style={{color:"#f59e0b",fontWeight:600,fontFamily:"Space Grotesk,sans-serif"}}>● {stages[active].name}</span>
          {out[active].length>0&&<span style={{color:"var(--text-muted)"}}>→ Feeds into: {out[active].map(v=>stages[v].name).join(", ")}</span>}
          {inc[active].length>0&&<span style={{color:"var(--text-muted)"}}>← Receives from: {inc[active].map(v=>stages[v].name).join(", ")}</span>}
          {stages[active].beginner&&<span style={{color:"#f59e0b"}}>⭐ Good starting point for new investors</span>}
        </div>
      )}
    </div>
  );
}

      const usr="Research "+tk.toUpperCase()+" as an investment. Find latest earnings, revenue growth, competitive position, valuation multiples, and analyst views. Follow the required section format exactly.";
      const {text,sources:src}=await callClaude(apiKey,sys,usr,MAX_NARRATIVE,true,setResult);
      const now=Date.now();setResult(text);setSources(src);setTs(now);
      LS.set(STORAGE_KEYS.research,{ticker:tk,result:text,sources:src,ts:now});
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[ticker,apiKey]);
  const pick=t=>{setTicker(t);research(t);};

  return (
    <div style={{padding:"28px 0"}}>
      <h2 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:22,fontWeight:700,marginBottom:6,letterSpacing:"-.01em"}}>Company Research</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",lineHeight:1.5,marginBottom:24}}>Build a full picture of any company — what it does, how it makes money, its financials, rivals, and risks.</p>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
        <input placeholder="e.g. AAPL" value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&research()} maxLength={10}
          style={{width:130,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}/>
        <StarToggle ticker={ticker}/>
        <button onClick={research} disabled={loading||!ticker.trim()}
          style={{padding:"10px 22px",borderRadius:"var(--radius-sm)",background:"var(--accent)",color:"#fff",border:"none",fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:600,cursor:loading||!ticker.trim()?"not-allowed":"pointer",opacity:loading||!ticker.trim()?.5:1}}>
          {loading?"…":"Research"}
        </button>
      </div>
      <Chips items={EXAMPLE_TICKERS} onClick={t=>setTicker(t)} style={{marginBottom:16}}/>
      <WatchlistBar onPick={pick}/>
      {loading&&!result&&<Loader label="Researching company fundamentals…"/>}
      {error&&<div style={{background:"#1e1010",border:"1px solid #4a1e1e",borderRadius:"var(--radius-sm)",color:"var(--danger)",padding:"14px 16px",fontSize:13}}>⚠️ {error}</div>}
      {result&&<>{ts&&<CachedBanner timestamp={ts} onClear={clearCache}/>}{loading&&<StreamNote/>}<ParsedResult text={result} sources={sources}/></>}
    </div>
  );
}

// ─── PANEL: Compare Stocks ────────────────────────────────────────────────────
function ComparePanel({ apiKey }) {
  const saved=LS.get(STORAGE_KEYS.compare);
  const [tickerA,setTickerA]=useState(saved?.tickerA||"");
  const [tickerB,setTickerB]=useState(saved?.tickerB||"");
  const [result,setResult]=useState(saved?.result||null);
  const [sources,setSources]=useState(saved?.sources||null);
  const [ts,setTs]=useState(saved?.ts||null);
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const clearCache=()=>{setResult(null);setSources(null);setTs(null);LS.del(STORAGE_KEYS.compare);};

  const compare=useCallback(async()=>{
    if(!tickerA.trim()||!tickerB.trim())return;
    const A=tickerA.toUpperCase(), B=tickerB.toUpperCase();
    setLoading(true);setError(null);setResult(null);setSources(null);setTs(null);
    try{
      const sys=buildSys(
        "You are a patient investment educator helping an 18-year-old compare two stocks: "+A+" and "+B+".",
        [
          {h:"Snapshot", d:"A Markdown table, columns: | Metric | "+A+" | "+B+" |, with rows for Market cap, Revenue (latest FY), Revenue growth, Gross margin, Operating margin, Net income, P/E, P/S, and Free cash flow."},
          {h:"Business Models", d:"2-4 sentences contrasting how each company makes money."},
          {h:"Growth & Financials", d:"2-4 sentences on how their growth and profitability compare."},
          {h:"Valuation", d:"2-4 sentences on which looks cheaper and why."},
          {h:"Risks", d:"2-3 short bullets for each company."},
          {h:"Moat — Who's Stronger", d:"2-4 sentences."},
          {h:"Which Is More Interesting for a Young Investor", d:"2-4 sentences with a clear pick and the reasoning."},
        ]
      );
      const usr="Compare "+A+" vs "+B+" as investments. Search for latest data — revenue growth, profit margins, P/E or P/S ratios, competitive position, recent news. Follow the required section format exactly.";
      const {text,sources:src}=await callClaude(apiKey,sys,usr,MAX_NARRATIVE,true,setResult);
      const now=Date.now();setResult(text);setSources(src);setTs(now);

  return (
    <div style={{padding:"28px 0"}}>
      <h2 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:22,fontWeight:700,marginBottom:6,letterSpacing:"-.01em"}}>Compare Stocks</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",lineHeight:1.5,marginBottom:24}}>Put two companies head-to-head on financials, valuation, competitive position, and risk.</p>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
        <input placeholder="Ticker A" value={tickerA} onChange={e=>setTickerA(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&compare()} maxLength={10}
          style={{width:120,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}/>
        <StarToggle ticker={tickerA}/>
        <span style={{fontFamily:"Space Grotesk,sans-serif",fontSize:12,fontWeight:700,color:"var(--text-dim)",letterSpacing:".1em"}}>VS</span>
        <input placeholder="Ticker B" value={tickerB} onChange={e=>setTickerB(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&compare()} maxLength={10}
          style={{width:120,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}/>
        <StarToggle ticker={tickerB}/>
        <button onClick={compare} disabled={loading||!tickerA.trim()||!tickerB.trim()}
          style={{padding:"10px 22px",borderRadius:"var(--radius-sm)",background:"var(--accent)",color:"#fff",border:"none",fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:600,cursor:loading||!tickerA.trim()||!tickerB.trim()?"not-allowed":"pointer",opacity:loading||!tickerA.trim()||!tickerB.trim()?.5:1}}>
          {loading?"…":"Compare"}
        </button>
      </div>
      <Chips items={PAIRS.map(([a,b])=>({label:a+" vs "+b,value:{a,b}}))} onClick={p=>{setTickerA(p.a);setTickerB(p.b);}} style={{marginBottom:16}}/>
      <WatchlistBar onPick={pick} label="Watchlist (fills next slot):"/>
      {loading&&!result&&<Loader label="Comparing both companies…"/>}
      {error&&<div style={{background:"#1e1010",border:"1px solid #4a1e1e",borderRadius:"var(--radius-sm)",color:"var(--danger)",padding:"14px 16px",fontSize:13}}>⚠️ {error}</div>}

    </div>
  );
}

// ─── PANEL: Industry Chain ────────────────────────────────────────────────────
function ChainPanel({ apiKey }) {
  const saved=LS.get(STORAGE_KEYS.chain);
  const [industry,setIndustry]         = useState(saved?.industry||"");
  const [chainData,setChainData]       = useState(saved?.chainData||null);
  const [result,setResult]             = useState(saved?.result||null);
  const [sources,setSources]           = useState(saved?.sources||null);
  const [ts,setTs]                     = useState(saved?.ts||null);
  const [loading,setLoading]           = useState(false);
  const [loadingStep,setLoadingStep]   = useState("");
  const [error,setError]               = useState(null);
  const [focusTicker,setFocusTicker]   = useState("");
  const [focusResult,setFocusResult]   = useState(null);
  const [focusSources,setFocusSources] = useState(null);
  const [focusLoading,setFocusLoading] = useState(false);
  const [lib,setLib]                   = useState(()=>LS.get(STORAGE_KEYS.chainLib,[]));
  const [libMsg,setLibMsg]             = useState("");
  const clearCache=()=>{setResult(null);setSources(null);setChainData(null);setTs(null);LS.del(STORAGE_KEYS.chain);};

  // Load the shared library from the server (mirror to localStorage for instant display).
  useEffect(()=>{
    let alive=true;
    libraryGet(apiKey).then(entries=>{ if(alive){ setLib(entries); LS.set(STORAGE_KEYS.chainLib,entries); } }).catch(()=>{});
    return ()=>{alive=false;};
  },[apiKey]);

  const inLib = lib.some(e=>(e.industry||"").trim().toLowerCase()===industry.trim().toLowerCase());

  // Open a saved chain instantly from cache — no API call.
  const pickChain=entry=>{
    setError(null);setLoading(false);setLoadingStep("");setLibMsg("");
    setIndustry(entry.industry);
    setChainData(entry.chainData||null);
    setResult(entry.result||null);
    setSources(entry.sources||null);
    setTs(entry.ts||null);
    setFocusResult(null);setFocusSources(null);setFocusTicker("");
    LS.set(STORAGE_KEYS.chain,{industry:entry.industry,chainData:entry.chainData,result:entry.result,sources:entry.sources,ts:entry.ts});
  };

  const saveCurrent=async()=>{
    if(!result) return;
    try{
      const entries=await libraryWrite(apiKey,{action:"save",entry:{industry,chainData,result,sources,ts:ts||Date.now()}});
      setLib(entries); LS.set(STORAGE_KEYS.chainLib,entries); setLibMsg("✓ Saved to the shared library.");
    }catch(e){ setLibMsg("Couldn't save: "+e.message); }
  };
  const deleteChain=async(industryName)=>{
    try{
      const entries=await libraryWrite(apiKey,{action:"delete",key:industryName});
      setLib(entries); LS.set(STORAGE_KEYS.chainLib,entries);
    }catch(e){ setLibMsg("Couldn't remove: "+e.message); }
  };

  const exploreChain=useCallback(async()=>{
    if(!industry.trim())return;
    setLoading(true);setError(null);setResult(null);setSources(null);setChainData(null);setFocusResult(null);setFocusSources(null);setTs(null);
    try{
      // Call 1: JSON structure with stages + edges + beginner flags
      setLoadingStep("Mapping chain structure…");
      const structSys=[
        "You are a financial analyst. Return ONLY a valid JSON object — no markdown, no explanation.",
        "The object must have two keys:",
        "\"stages\": array of objects. Each: { id (integer 0-based), name (string), what (string, one sentence max 15 words), companies (array of 3-5 real listed ticker strings), margin (string e.g. Low 5-8%), beginner (boolean — true for the 1-2 stages that are the most transparent, liquid, and easiest to understand for a first-time investor) }.",
        "\"edges\": array of directed flow objects. Each: { from (integer stage id), to (integer stage id), secondary (boolean, true if less common path) }.",
        "Edges must capture REAL branching flow — a stage can have multiple outgoing and incoming edges.",
        "Do NOT just chain stages 0->1->2->3 linearly unless that is genuinely how the industry works.",
        "Mark beginner:true on only 1-2 stages maximum — the ones where stocks are most accessible and easiest to analyse for a beginner.",
        "Include ALL stages from raw materials to end consumer. Typically 8-12 stages.",
        "Return ONLY the JSON object.",
      ].join("\n");
      const structUsr="Return the complete value chain stages and flow edges for the "+industry+" industry. Real tickers only. Capture real branching, not a linear chain. Mark the 1-2 most beginner-friendly stages.";
      const {text:jsonRaw}=await callClaude(apiKey,structSys,structUsr,2000,false);
      let parsedData=null;
      try{
        // Strip code fences, then isolate the outermost { ... } in case of stray prose.
        let cleaned=jsonRaw.replace(/^```[\w]*\n?/gm,"").replace(/```/g,"").trim();
        const first=cleaned.indexOf("{"), lastb=cleaned.lastIndexOf("}");
        if(first>=0&&lastb>first) cleaned=cleaned.slice(first,lastb+1);
        const obj=JSON.parse(cleaned);
        if(Array.isArray(obj.stages)&&Array.isArray(obj.edges)&&obj.stages.length>0)parsedData=obj;
      }catch(_){}
      setChainData(parsedData);

      // Call 2: Full written analysis — single call with canonical list
      const stageList=parsedData ? parsedData.stages.map(s=>"Stage "+(s.id+1)+": "+s.name).join(" | ") : "";
      setLoadingStep("Researching all stages and writing analysis…");
      const writtenSys=[
        "You are an investment educator writing for an 18-year-old learning to invest.",
        "The canonical stage list for the "+industry+" industry is:",
        stageList,
        "",
        "Write a breakdown covering EVERY stage — in order, no gaps, no renaming. Keep each stage tight.",
        "For each stage use EXACTLY this format:",
        "",
        "**Stage N: [Name from canonical list]**",
        "What happens: [1-2 sentences, no more.]",
        "Key companies: [TICKER — Company Name | TICKER — Company Name | TICKER — Company Name]",
        "Investor angle: [ONE sentence on why this stage is or isn't an interesting investment.]",
        "---",
        "",
        "After ALL stages, write these sections (each 2-4 sentences or a short table — no more):",
        "",
        "## Where the Pricing Power Sits",
        "[Which stage(s) control margins and why. Quote margin ranges.]",
        "",
        "## Hidden Gems — Less-Obvious Investment Angles",
        "[2-3 companies in overlooked stages. For each: TICKER, stage, why interesting, one risk.]",
        "",
        "## Best Stages to Invest In Right Now",
        "[Rank the top 2-3 stages. For each: stage name, why attractive now, one named stock, one caution. Be specific and opinionated.]",
        "",
        "## How to Think About This as an Investor",
        "[A short practical framework: what to ask and what signals to look for.]",
        "",
        "## Key Numbers",
        "A Markdown table (columns: | Metric | Value |) of 3-5 headline industry figures (e.g. market size, growth rate, highest-margin stage).",
        "",
        "## What to Watch Next",
        "Exactly ONE sentence on the most important thing to monitor in this industry.",
        "",
        "Use only stage names and numbers from the canonical list. Cover every stage but stay concise. Put company lists and figures in tables where it helps.",
      ].join("\n");
      const writtenUsr="Write the concise stage-by-stage breakdown for ALL "+industry+" industry stages listed above, then the analysis and closing sections. Search for real current company data. Cover every stage but keep each one tight, and follow the required format exactly.";
      const {text,sources:src}=await callClaude(apiKey,writtenSys,writtenUsr,MAX_NARRATIVE,true,setResult);
      const now=Date.now();
      setResult(text);setSources(src);setTs(now);
      LS.set(STORAGE_KEYS.chain,{industry,chainData:parsedData,result:text,sources:src,ts:now});
      // Save/refresh this chain in the shared family library automatically.
      try{
        const entries=await libraryWrite(apiKey,{action:"save",entry:{industry,chainData:parsedData,result:text,sources:src,ts:now}});
        setLib(entries); LS.set(STORAGE_KEYS.chainLib,entries); setLibMsg("✓ Saved to the shared library.");
      }catch(e){ setLibMsg("Ran fine, but couldn't save to library: "+e.message); }
    }catch(e){setError(e.message);}
    finally{setLoading(false);setLoadingStep("");}
  },[industry,apiKey]);

  const drillDown=useCallback(async(override)=>{
    const tk=((typeof override==="string"?override:focusTicker)||"").trim();
    if(!tk)return;
    setFocusLoading(true);setFocusResult(null);setFocusSources(null);
    try{
      const T=tk.toUpperCase();
      const sys=buildSys(
        "You are helping a young investor evaluate "+T+" as part of the "+industry+" value chain.",
        [
          {h:"Where "+T+" Sits in the Chain", d:"2-4 sentences."},
          {h:"Why This Position Is (or Isn't) Attractive", d:"2-4 sentences."},
          {h:"Financials & Recent Performance", d:"A short Markdown table (columns: | Metric | Value |) of the key figures, then 1-2 sentences."},
          {h:"Exposure to the Rest of the Chain", d:"2-4 sentences on dependencies on suppliers, customers, or other stages."},
          {h:"Watch-List Verdict", d:"2-4 sentences."},
        ]
      );
      const usr="Drill into "+T+" as part of the "+industry+" value chain. Search for current information — its specific role, recent financials, news, competitive position. Follow the required section format exactly.";
      const {text,sources:src}=await callClaude(apiKey,sys,usr,MAX_NARRATIVE,true,setFocusResult);
      setFocusResult(text);setFocusSources(src);
    }catch(e){setFocusResult("Error: "+e.message);}
    finally{setFocusLoading(false);}
  },[focusTicker,industry,apiKey]);
  const pickFocus=t=>{setFocusTicker(t);drillDown(t);};

  return (
    <div style={{padding:"28px 0"}}>
      <h2 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:22,fontWeight:700,marginBottom:6,letterSpacing:"-.01em"}}>Industry Chain Explorer</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",lineHeight:1.5,marginBottom:24}}>Map the full value chain — raw materials to end product — and find where the real investment opportunities sit.</p>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
        <input placeholder="e.g. Semiconductors, Electric Vehicles, Pharmaceuticals"
          value={industry} onChange={e=>setIndustry(e.target.value)} onKeyDown={e=>e.key==="Enter"&&exploreChain()}
          style={{flex:1,minWidth:240,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none"}}/>
        <button onClick={exploreChain} disabled={loading||!industry.trim()}
          style={{padding:"10px 22px",borderRadius:"var(--radius-sm)",background:"var(--accent)",color:"#fff",border:"none",fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:600,cursor:loading||!industry.trim()?"not-allowed":"pointer",opacity:loading||!industry.trim()?.5:1}}>
          {loading?"…":(inLib?"Refresh Chain":"Explore Chain")}
        </button>
      </div>
      <Chips items={EXAMPLE_INDUSTRIES} onClick={v=>setIndustry(v)} style={{marginBottom:16}}/>

      {/* Saved chain library — shared across the family. Anyone can open, save, or remove. */}
      {lib.length>0&&(
        <div style={{marginBottom:16}}>
          <div style={{fontSize:12,color:"var(--accent3)",marginBottom:8}}>📚 Saved chains — click to open instantly (× to remove):</div>
          <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
            {lib.map(e=>{
              const active=(industry||"").trim().toLowerCase()===(e.industry||"").trim().toLowerCase();
              return (
                <span key={e.industry} title={e.ts?("Saved "+new Date(e.ts).toLocaleDateString("en-AU",{day:"numeric",month:"short",year:"numeric"})):""}
                  style={{display:"inline-flex",alignItems:"center",gap:6,background:"var(--surface2)",border:"1px solid "+(active?"var(--accent)":"var(--border)"),borderRadius:20,padding:"4px 6px 4px 12px"}}>
                  <button onClick={()=>pickChain(e)}
                    style={{background:"none",border:"none",color:active?"var(--accent)":"var(--text)",fontSize:12,fontWeight:600,cursor:"pointer",padding:0}}>{e.industry}</button>
                  <button onClick={()=>deleteChain(e.industry)} title="Remove from library"
                    style={{background:"none",border:"none",color:"var(--text-dim)",fontSize:14,lineHeight:1,cursor:"pointer",padding:0}}>×</button>
                </span>
              );
            })}
          </div>
        </div>
      )}

      <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap",marginBottom:20,fontSize:12,color:"var(--text-dim)"}}>
        <span>Chains you run are saved to the shared library automatically.</span>
        {result&&!inLib&&<button onClick={saveCurrent} style={{background:"var(--surface2)",border:"1px solid var(--border)",borderRadius:6,color:"var(--text)",fontSize:12,padding:"4px 10px",cursor:"pointer",fontFamily:"Inter,sans-serif"}}>💾 Save current to library</button>}
        {libMsg&&<span style={{color:libMsg.startsWith("✓")?"var(--success)":"var(--text-muted)"}}>{libMsg}</span>}
      </div>

      {loading&&!result&&<Loader label={loadingStep||"Mapping value chain…"}/>}
      {error&&<div style={{background:"#1e1010",border:"1px solid #4a1e1e",borderRadius:"var(--radius-sm)",color:"var(--danger)",padding:"14px 16px",fontSize:13}}>⚠️ {error}</div>}
      {chainData&&<FlowDiagram stages={chainData.stages} edges={chainData.edges}/>}
      {result&&(
        <>
          {ts&&<CachedBanner timestamp={ts} onClear={clearCache}/>}
          {loading&&<StreamNote/>}
          <ParsedResult text={result} sources={sources}/>
          {ts&&(
          <div style={{marginTop:32,background:"var(--surface2)",border:"1px solid var(--border)",borderLeft:"3px solid var(--accent3)",borderRadius:"var(--radius)",padding:"24px 28px"}}>
            <h3 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:16,fontWeight:700,marginBottom:6}}>🔎 Drill into a Company from This Chain</h3>
            <p style={{fontSize:13,color:"var(--text-muted)",marginBottom:16}}>Spotted a company above? Enter its ticker for a focused deep-dive.</p>
            <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap"}}>
              <input placeholder="e.g. ASML" value={focusTicker} onChange={e=>setFocusTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&drillDown()} maxLength={10}
                style={{width:120,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}/>
              <StarToggle ticker={focusTicker}/>
              <button onClick={drillDown} disabled={focusLoading||!focusTicker.trim()}
                style={{padding:"10px 22px",borderRadius:"var(--radius-sm)",background:"var(--surface2)",border:"1px solid var(--border)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:600,cursor:focusLoading||!focusTicker.trim()?"not-allowed":"pointer",opacity:focusLoading||!focusTicker.trim()?.5:1}}>
                {focusLoading?"…":"Drill Down"}
              </button>
            </div>
            <WatchlistBar onPick={pickFocus} label="Watchlist:"/>
            {focusLoading&&!focusResult&&<Loader label="Researching this company's role in the chain…"/>}
            {focusResult&&<>{focusLoading&&<StreamNote/>}<ParsedResult text={focusResult} sources={focusSources}/></>}
          </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── PANEL: Analyst Panel ─────────────────────────────────────────────────────
const PANEL = [
  { name:"🏛️ The Value Investor",  style:"a disciplined value investor in the spirit of Warren Buffett and Ben Graham. You prize durable competitive moats, predictable owner earnings, strong balance sheets, capable and honest management, and a clear margin of safety versus intrinsic value. You are wary of hype, rich multiples, and businesses you can't understand." },
  { name:"🚀 The Tech Growth Bull", style:"a technology growth investor in the spirit of Dan Ives. You focus on large secular themes (AI, cloud, cybersecurity, EVs), expanding total addressable markets, platform shifts, and category leaders. You will tolerate a high multiple when the growth runway and competitive position justify it, and you weigh narrative and momentum." },
  { name:"📊 The Quant",            style:"a dispassionate quantitative analyst. You reason in factors and hard data — valuation multiples, quality (ROIC, margins), momentum, growth, balance-sheet strength, and statistical signals. You avoid narrative, cite concrete numbers, and openly flag where the data is thin or noisy." },
  { name:"⚖️ The GARP Investor",    style:"a growth-at-a-reasonable-price investor. You hunt for solid, durable growth that isn't overpriced — a reasonable PEG, sustainable earnings growth, sensible valuations. You sit between the deep-value and high-growth camps and dislike overpaying for growth." },
];

function panelSys(mode) {
  const roster = PANEL.map(a=>"- "+a.name+": "+a.style).join("\n");
  const head = [
    "You are the moderator of a panel of investment analysts helping an 18-year-old learn to invest.",
    "Each analyst below has a distinct, consistent investing style. Stay fully in character for each — let them genuinely disagree where their styles differ.",
    "Be specific: use real tickers and real, recent figures (search the web). Explain any jargon in plain English. This is educational, NOT financial advice.",
    "",
    "VALUATION IS CENTRAL: every analyst must ground their view in valuation. For each stock, compare its current multiples (P/E, EV/EBITDA, P/S — whichever fit) to BOTH its industry/peers AND its own history. Then explicitly address the key dynamic:",
    "- If it trades at a PREMIUM: can it grow into that multiple? Quantify roughly the earnings growth needed and judge how realistic that is, with the main risk if it doesn't.",
    "- If it trades at a DISCOUNT: what would re-rate it toward the industry/market average, and what's the risk it stays cheap (value trap)?",
    "Each analyst weighs this through their own lens (the value/GARP analysts are stricter on price paid; the growth bull will pay up when the runway justifies it; the quant cites the numbers).",
    "",
    "THE PANEL (use these exact names as the section headings, in this order):",
    roster,
    "",
  ];
  const body = mode==="thesis" ? [
    "TASK: The user gives an investment THESIS. Each analyst stress-tests it from their own style.",
    "Structure: one '## ' section per analyst (exact names above, in order), then the synthesis. In each analyst section use:",
    "**Verdict:** Agree / Partly agree / Disagree — then 2-4 sentences of reasoning in character, citing specific numbers.",
    "*Valuation read:* one line on where it trades vs peers/history and whether it can grow into its multiple (or re-rate toward fair value), with the main risk.",
    "*What would change my mind:* one sentence.",
  ] : [
    "TASK: Each analyst proposes investment IDEAS in their own style, for the focus the user gives (or the broad market if none).",
    "Structure: one '## ' section per analyst (exact names above, in order), then the synthesis. In each analyst section write:",
    "One sentence on what this analyst is hunting for, then a Markdown table with columns: | Ticker | Idea in one line | Valuation vs peers/history | Why it fits this style |",
    "In the valuation column, note the key multiple vs peers/history and whether it can grow into it or re-rate. Give 2-3 ideas, then one sentence on the main risk to those picks.",
  ];
  const tail = [
    "",
    "## 🧑‍⚖️ Panel Chair — Synthesis",
    "A short, balanced wrap-up with three bold-labelled parts: **Consensus** (where the analysts agree), **Key disagreements** (the main tensions between them), and **Bottom line** (a measured 1-2 sentence takeaway).",
    "",
    "FORMATTING RULES:",
    "- Output ONLY the sections described, each starting with '## ', in order. Write nothing before the first heading or after the last.",
    "- Keep each analyst to a few sentences or a small table — balanced, not bloated.",
    "- Put picks and figures in Markdown tables. Write \"n/a\" instead of guessing a missing number.",
  ];
  return head.concat(body, tail).join("\n");
}

function ValuationPanel({ apiKey }) {

  const [ticker,setTicker]=useState(saved?.ticker||"");
  const [result,setResult]=useState(saved?.result||null);
  const [sources,setSources]=useState(saved?.sources||null);

  const [loading,setLoading]=useState(false);
  const [error,setError]=useState(null);
  const clearCache=()=>{setResult(null);setSources(null);setTs(null);LS.del(STORAGE_KEYS.valuation);};

  const analyse=useCallback(async(override)=>{
    const tk=((typeof override==="string"?override:ticker)||"").trim();
    if(!tk)return;
    setLoading(true);setError(null);setResult(null);setSources(null);setTs(null);
    try{
      const T=tk.toUpperCase();
      const sys=buildSys(
        "You are an investment educator helping an 18-year-old judge whether a stock is cheaply or expensively valued versus its industry and its own history. Be specific with real, recent numbers and clearly name the sector/peer group you compare against.",
        [
          {h:"Where "+T+" Trades Today", d:"A Markdown table with columns: | Metric | "+T+" now | "+T+" 5-yr avg | Industry now | Industry 5-yr avg |. Rows: the most relevant of Forward P/E, P/E, P/S, EV/EBITDA, P/B, PEG, Dividend yield. Use \"n/a\" where a metric doesn't apply or isn't available."},
          {h:"Read on the Multiple", d:"Begin by naming the industry / peer group used. Then 2-4 sentences: is "+T+" cheap or expensive versus its industry and versus its own history, and what justifies any premium or discount (growth, margins, quality, risk)?"},
          {h:"Path to Fair Value", d:"A Markdown table with columns: | Scenario | What would have to happen | Implied share-price move |. Include at least three rows: re-rate to the industry-average multiple at today's earnings; grow into today's multiple via earnings growth (no price change); and a balanced mix of both. Then ONE sentence on the realistic catalysts that could drive a re-rating."},
          {h:"What Today's Price Assumes", d:"1-3 sentences on the earnings growth and/or margins the current multiple implies — i.e., the expectations baked into the price."},
        ]
      );
      const usr="Analyse the valuation of "+T+" versus its industry/sector and its own ~5-year history. Search for current and historical valuation multiples for both the company and its peer group. Follow the required format exactly.";
      const {text,sources:src}=await callClaude(apiKey,sys,usr,MAX_NARRATIVE,true,setResult);
      const now=Date.now();setResult(text);setSources(src);setTs(now);
      LS.set(STORAGE_KEYS.valuation,{ticker:tk,result:text,sources:src,ts:now});
    }catch(e){setError(e.message);}finally{setLoading(false);}
  },[ticker,apiKey]);
  const pick=t=>{setTicker(t);analyse(t);};

  return (
    <div style={{padding:"28px 0"}}>
      <h2 style={{fontFamily:"Space Grotesk,sans-serif",fontSize:22,fontWeight:700,marginBottom:6,letterSpacing:"-.01em"}}>Valuation</h2>
      <p style={{fontSize:14,color:"var(--text-muted)",lineHeight:1.5,marginBottom:24}}>See a stock's valuation multiples against its industry and its own history — and exactly what would have to happen for it to reach a fairer value.</p>
      <div style={{display:"flex",gap:10,alignItems:"center",flexWrap:"wrap",marginBottom:12}}>
        <input placeholder="e.g. NVDA" value={ticker} onChange={e=>setTicker(e.target.value.toUpperCase())} onKeyDown={e=>e.key==="Enter"&&analyse()} maxLength={10}
          style={{width:130,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-sm)",color:"var(--text)",fontFamily:"Inter,sans-serif",fontSize:14,padding:"10px 14px",outline:"none",fontWeight:600,letterSpacing:".05em",textTransform:"uppercase"}}/>
        <StarToggle ticker={ticker}/>
        <button onClick={analyse} disabled={loading||!ticker.trim()}
          style={{padding:"10px 22px",borderRadius:"var(--radius-sm)",background:"var(--accent)",color:"#fff",border:"none",fontFamily:"Inter,sans-serif",fontSize:13,fontWeight:600,cursor:loading||!ticker.trim()?"not-allowed":"pointer",opacity:loading||!ticker.trim()?.5:1}}>
          {loading?"…":"Check Valuation"}
        </button>
      </div>
      <Chips items={EXAMPLE_TICKERS} onClick={t=>setTicker(t)} style={{marginBottom:16}}/>
      <WatchlistBar onPick={pick}/>
      {loading&&!result&&<Loader label="Pulling valuation multiples and peer data…"/>}
      {error&&<div style={{background:"#1e1010",border:"1px solid #4a1e1e",borderRadius:"var(--radius-sm)",color:"var(--danger)",padding:"14px 16px",fontSize:13}}>⚠️ {error}</div>}
      {result&&<>{ts&&<CachedBanner timestamp={ts} onClear={clearCache}/>}{loading&&<StreamNote/>}<ParsedResult text={result} sources={sources}/></>}
    </div>
  );
}
